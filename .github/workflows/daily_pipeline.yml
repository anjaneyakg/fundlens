name: FundLens Daily Pipeline

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      run_backfill:
        description: 'Run backfill (Cell 3) as well?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_main:
        description: 'Skip main pipeline (Cell 1+2)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil

      - name: Run Cell 1 (Fetch + Compute)
        if: github.event.inputs.skip_main != 'true'
        working-directory: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          echo "=== Cell 1: Fetching from AMFI and computing returns ==="
          python pipeline_cell1.py

      - name: Run Cell 2 (Upload to Gist)
        if: github.event.inputs.skip_main != 'true'
        working-directory: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          echo "=== Cell 2: Uploading to GitHub Gist ==="
          python pipeline_cell2.py

      - name: Run Cell 3 (Historical Backfill)
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.run_backfill == 'true'
        working-directory: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          echo "=== Cell 3: Extending historical archive ==="
          python pipeline_cell3_backfill.py

      - name: Report success
        if: success()
        run: echo "FundLens pipeline completed successfully."

      - name: Report failure
        if: failure()
        run: echo "FundLens pipeline FAILED. Existing Gist preserved."
